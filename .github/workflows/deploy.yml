name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "src/svg/**"
      - "src/styles/**"
      - "src/vanilla/**"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-icons
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/ewooral/icons-ewooral:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd ~/apps/icons-ewooral

            # Retry pull — ghcr.io occasionally drops mid-layer. Without this
            # the deploy can silently restart the OLD image and report green.
            for attempt in 1 2 3 4 5; do
              if docker compose pull; then
                echo "Pull succeeded on attempt $attempt"
                break
              fi
              if [ "$attempt" = "5" ]; then
                echo "FATAL: compose pull failed after 5 attempts — aborting deploy"
                exit 1
              fi
              echo "Pull attempt $attempt failed — retrying in 10s"
              sleep 10
            done

            docker compose up -d --force-recreate --remove-orphans
            docker image prune -f
