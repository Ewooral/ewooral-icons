<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@ewooral/icons — Playground</title>
    <style>
      :root {
        --bg: #0e0e0e;
        --bg-2: #171717;
        --bg-3: #1f1f1f;
        --ink: #f0f0f0;
        --ink-dim: #a0a0a0;
        --ink-faint: #636363;
        --accent: #f5b820;
        --line: rgba(255,255,255,0.08);
      }
      [data-theme="light"] {
        --bg: #f8f6f0;
        --bg-2: #ffffff;
        --bg-3: #eeede9;
        --ink: #1c1c1a;
        --ink-dim: #5a5a56;
        --ink-faint: #8a8a84;
        --accent: #d99500;
        --line: rgba(0,0,0,0.1);
      }
      [data-theme="green"] {
        --bg: #1a3a2a;
        --bg-2: #142a1e;
        --bg-3: #0f2017;
        --ink: #f5f1e8;
        --ink-dim: #a8a39a;
        --ink-faint: #6b6760;
        --accent: #f5b820;
        --line: rgba(245,241,232,0.08);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, -apple-system, sans-serif; min-height: 100vh; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./playground.tsx"></script>
  </body>
</html>
