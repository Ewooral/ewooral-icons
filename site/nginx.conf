# nginx vhost inside the Docker container — fronted by the host's nginx
# (which terminates TLS at icons.ewooral.com and proxies to 172.17.0.1:3004).

server {
  listen 3004 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  # Compression — static export ships ~270 KB HTML pages with inline SVGs.
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain text/css text/javascript application/javascript
    application/json image/svg+xml application/manifest+json;

  # Long-cache the immutable Next.js asset bundles.
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # Source SVGs / sprite / fonts — short cache, content-hashed by name.
  location ~* \.(svg|png|webp|woff2?|ttf)$ {
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # Trailing-slash URLs: Next.js static export creates both /icons/foo.html
  # AND a /icons/foo/ directory (for RSC payload files) but no index.html in
  # the directory — so /icons/foo/ would otherwise 403. Strip the slash and
  # serve the matching .html file (same content, no redirect).
  location ~ ^(/.+)/$ {
    try_files $1.html =404;
  }

  # Static export pages: /about → /about.html → /about/index.html
  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }

  # 404 page emitted by `next build`.
  error_page 404 /404.html;
  location = /404.html {
    internal;
  }
}
